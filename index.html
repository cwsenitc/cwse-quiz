<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoSH Quiz | CWSE, ICC - NITC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        .peer:checked + label { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .no-select { user-select: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="welcome-screen" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-indigo-600">
        <div class="text-center mb-8">
            <h1 id="display-title" class="text-2xl font-black text-slate-800 tracking-tight">Loading...</h1>
            <p id="display-subtitle" class="text-slate-500 text-sm"></p>
            <p id="display-dates" class="text-slate-300 text-sm italic"></p>
        </div>
        <div id="input-fields-container" class="space-y-4">
            </div>
        
        <div id="status-box" class="pt-4 text-center">
            <div id="wait-msg" class="p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 font-medium">
                <span class="animate-pulse">⏳</span> Wait for Admin to enable...
            </div>
            <button id="start-btn" onclick="startQuiz()" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-[1.02]">
                Start Quiz (<span id="set-time-display">10</span> Mins)
            </button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl no-select relative">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <span id="q-count" class="font-bold text-indigo-600 uppercase text-xs tracking-widest italic">Question 1</span>
            <div id="timer" class="text-2xl font-black text-red-600 font-mono">--:--</div>
        </div>
        <div id="quiz-content" class="mb-10 min-h-[150px]">
            <h2 id="q-text" class="text-xl font-bold text-slate-800 mb-6 leading-tight"></h2>
            <div id="options-container" class="grid gap-3"></div>
        </div>
    </div>

    <div id="feedback-screen" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Feedback</h2>
        <p class="text-slate-500 mb-6 text-xs italic">Please rate the following:</p>
        <div id="feedback-questions-container" class="space-y-8"></div>
        <button onclick="submitFinal()" id="final-submit-btn" class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition">Submit</button>
    </div>

    <div id="thank-you-screen" class="hidden bg-white p-12 rounded-2xl shadow-xl w-full max-w-md text-center border-t-8 border-emerald-500">
        <h2 class="text-3xl font-black text-slate-800 mb-4">Success!</h2>
        <p class="text-slate-600 mb-8">Your responses have been recorded.</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnG3Hk8AfZoG0fcI6QMwRLReUNcEFLcz8",
            authDomain: "cwseunnati.firebaseapp.com",
            projectId: "cwseunnati",
            storageBucket: "cwseunnati.firebasestorage.app",
            messagingSenderId: "557397468479",
            appId: "1:557397468479:web:55ff3a96b5c2b7f33c1f8a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let questions = [], currentIndex = 0, timeLeft = 0, timerInterval, userAnswers = {};
        let config = {};

        // Real-time Settings Sync
        db.collection('settings').doc('quizStatus').onSnapshot(doc => {
            if(!doc.exists || localStorage.getItem("posh_quiz_submitted") === "true") return;
            config = doc.data();
            
            // Update UI Header
            document.getElementById('display-title').innerText = config.title || "Quiz";
            document.getElementById('display-subtitle').innerText = config.subtitle || "";
            document.getElementById('display-dates').innerText = config.dates || "";

            // Render Input Fields
            const inputCont = document.getElementById('input-fields-container');
            if(inputCont.children.length === 0 && config.inputs) {
                config.inputs.forEach(inp => {
                    const el = document.createElement('input');
                    el.type = "text"; el.id = `input-${inp.label}`; el.placeholder = inp.placeholder;
                    el.className = "w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 mb-2";
                    inputCont.appendChild(el);
                });
            }

            // Start Button Logic
            const btn = document.getElementById('start-btn'), msg = document.getElementById('wait-msg');
            if(config.active) {
                btn.classList.remove('hidden'); msg.classList.add('hidden');
                document.getElementById('set-time-display').innerText = config.duration || 10;
                if(timeLeft === 0) timeLeft = (config.duration || 10) * 60;
            } else {
                btn.classList.add('hidden'); msg.classList.remove('hidden');
            }
        });

        async function startQuiz() {
            // Validate inputs dynamically
            const inputs = {};
            config.inputs.forEach(inp => {
                const val = document.getElementById(`input-${inp.label}`).value;
                if(!val) return alert(`Please enter ${inp.label}`);
                inputs[inp.label] = val;
            });

            const qSnap = await db.collection('questions').get();
            questions = qSnap.docs.map(doc => doc.data());
            if(config.questionLimit > 0) questions = questions.sort(() => 0.5 - Math.random()).slice(0, config.questionLimit);

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
            startTimer();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('q-count').innerText = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('q-text').innerText = q.text;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition font-semibold";
                b.innerText = opt;
                b.onclick = () => { 
                    userAnswers[currentIndex] = { selected: opt, correct: q.correct, pts: q.points }; 
                    if(++currentIndex < questions.length) showQuestion(); else endQuiz();
                };
                container.appendChild(b);
            });
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if(--timeLeft <= 0) endQuiz();
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        function endQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            renderFeedback();
        }

        function renderFeedback() {
            const container = document.getElementById('feedback-questions-container');
            container.innerHTML = '';
            config.feedbackQs.forEach((q, i) => {
                const div = document.createElement('div');
                div.innerHTML = `<label class="block font-bold text-sm text-slate-700 mb-3">${i+1}. ${q}</label>
                    <div class="flex justify-between gap-2">
                        ${[1,2,3,4,5].map(n => `<input type="radio" name="f_${i}" id="f_${i}_${n}" value="${n}" class="hidden peer" ${n===5?'checked':''}>
                        <label for="f_${i}_${n}" class="w-10 h-10 flex items-center justify-center border-2 rounded-lg cursor-pointer font-bold transition peer-checked:bg-indigo-600 peer-checked:text-white">${n}</label>`).join('')}
                    </div>`;
                container.appendChild(div);
            });
        }

        async function submitFinal() {
            let score = 0;
            Object.values(userAnswers).forEach(a => { if(a.selected === a.correct) score += parseInt(a.pts); });
            
            const feedbackResults = config.feedbackQs.map((q, i) => ({
                question: q,
                rating: document.querySelector(`input[name="f_${i}"]:checked`).value
            }));

            const userData = {};
            config.inputs.forEach(inp => userData[inp.label] = document.getElementById(`input-${inp.label}`).value);

            await db.collection('submissions').add({
                ...userData,
                score,
                feedback: feedbackResults,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            localStorage.setItem("posh_quiz_submitted", "true");
            location.reload();
        }
    </script>
</body>
</html>
