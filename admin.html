<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoSH Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div id="dashboard" class="max-w-7xl mx-auto space-y-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h2 class="font-black text-indigo-600">EVENT DETAILS</h2>
                <input type="text" id="set-title" placeholder="Main Title" class="w-full p-2 border rounded">
                <input type="text" id="set-subtitle" placeholder="Subtitle (Org Name)" class="w-full p-2 border rounded">
                <input type="text" id="set-dates" placeholder="Dates (e.g. Feb 03-05)" class="w-full p-2 border rounded">
                <div class="flex gap-4">
                    <label class="text-xs font-bold">Duration (Mins): <input type="number" id="set-duration" class="w-16 border p-1"></label>
                    <label class="text-xs font-bold">Q Limit: <input type="number" id="set-limit" class="w-16 border p-1"></label>
                </div>
            </div>
            <div class="space-y-4">
                <h2 class="font-black text-emerald-600">FEEDBACK & INPUTS</h2>
                <textarea id="set-inputs" placeholder="Inputs (Label,Placeholder per line)" class="w-full p-2 border rounded text-xs h-20"></textarea>
                <textarea id="set-feedback" placeholder="Feedback Questions (One per line)" class="w-full p-2 border rounded text-xs h-20"></textarea>
                <button onclick="updateGlobalSettings()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded">Save All Settings</button>
            </div>
        </div>

        <div id="dynamic-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
             </div>
    </div>

    <script>
        // ... (Firebase initialization same as your code) ...

        async function updateGlobalSettings() {
            const inputs = document.getElementById('set-inputs').value.split('\n').map(l => ({
                label: l.split(',')[0].trim(),
                placeholder: l.split(',')[1]?.trim() || ""
            })).filter(x => x.label);

            const feedbackQs = document.getElementById('set-feedback').value.split('\n').filter(q => q.trim());

            await db.collection('settings').doc('quizStatus').set({
                title: document.getElementById('set-title').value,
                subtitle: document.getElementById('set-subtitle').value,
                dates: document.getElementById('set-dates').value,
                duration: parseInt(document.getElementById('set-duration').value),
                questionLimit: parseInt(document.getElementById('set-limit').value),
                inputs: inputs,
                feedbackQs: feedbackQs,
                active: true
            }, { merge: true });
            alert("Settings Updated!");
        }

        // Live stats for dynamic feedback questions
        db.collection('submissions').onSnapshot(snap => {
            const totals = {};
            let count = 0;
            
            snap.forEach(doc => {
                const data = doc.data();
                if(data.feedback) {
                    count++;
                    data.feedback.forEach(f => {
                        totals[f.question] = (totals[f.question] || 0) + parseInt(f.rating);
                    });
                }
            });

            const statsDiv = document.getElementById('dynamic-stats');
            statsDiv.innerHTML = '';
            for (const [q, total] of Object.entries(totals)) {
                statsDiv.innerHTML += `
                <div class="bg-white p-4 rounded-xl border text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${q}</p>
                    <h3 class="text-2xl font-black text-indigo-600">${(total/count).toFixed(1)}</h3>
                </div>`;
            }
        });

        // Initialize Settings in Form
        db.collection('settings').doc('quizStatus').get().then(doc => {
            const d = doc.data();
            document.getElementById('set-title').value = d.title || "";
            document.getElementById('set-subtitle').value = d.subtitle || "";
            document.getElementById('set-dates').value = d.dates || "";
            document.getElementById('set-duration').value = d.duration || 10;
            document.getElementById('set-limit').value = d.questionLimit || 0;
            document.getElementById('set-inputs').value = d.inputs.map(i => `${i.label},${i.placeholder}`).join('\n');
            document.getElementById('set-feedback').value = d.feedbackQs.join('\n');
        });
    </script>
</body>
</html>
